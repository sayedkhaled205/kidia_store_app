name: Quality checks

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

permissions:
  contents: write

jobs:
  plugin:
    name: WordPress plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint PHP
        run: find kidia-mobile-cms -type f -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Check JavaScript syntax
        run: find kidia-mobile-cms -type f -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Install Builder browser test dependencies
        run: npm ci
      - name: Run Builder browser contract tests
        run: npm run test:builders
      - name: Run PHP contract tests
        run: find kidia-mobile-cms/tests -type f -name '*-test.php' -print0 | sort -z | xargs -0 -n1 php

  flutter:
    name: Flutter app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Build embedded CMS Flutter Web preview
        run: bash tool/build_cms_flutter_preview.sh
      - name: Commit rebuilt CMS Flutter Web preview
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet -- kidia-mobile-cms/admin/flutter-preview; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kidia-mobile-cms/admin/flutter-preview
          git commit -m "Rebuild embedded Flutter preview"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Upload CMS Flutter Web preview
        uses: actions/upload-artifact@v4
        with:
          name: cms-flutter-preview
          path: kidia-mobile-cms/admin/flutter-preview
          if-no-files-found: error
      - name: Verify committed preview matches current Flutter source
        run: git diff --exit-code -- kidia-mobile-cms/admin/flutter-preview
      - name: Build Android debug APK
        run: >-
          flutter build apk --debug
          --dart-define=STORE_URL=https://example.com
          --dart-define=STORE_NAME=Kidia
          --dart-define=STORE_LOCALE=ar
