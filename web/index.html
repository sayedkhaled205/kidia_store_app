<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="kidia_store_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>kidia_store_app</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
    }
    flutter-view, flt-glass-pane {
      width: 100%;
      height: 100%;
    }
    #kidia-flutter-loading {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-content: center;
      gap: 12px;
      background: #fff;
      color: #2f806e;
      font: 700 15px/1.4 Arial, sans-serif;
      text-align: center;
    }
    #kidia-flutter-loading::before {
      width: 30px;
      height: 30px;
      margin: 0 auto;
      border: 3px solid #d9ebe6;
      border-top-color: #2f806e;
      border-radius: 50%;
      content: "";
      animation: kidia-preview-spin .8s linear infinite;
    }
    #kidia-flutter-loading.is-error::before { display: none; }
    @keyframes kidia-preview-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="kidia-flutter-loading" role="status" aria-live="polite">Loading exact Flutter preview…</div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // This build is embedded in the versioned WordPress plugin. Never let an
    // older preview worker or cached Dart bundle survive a plugin update.
    (async function startKidiaPreview() {
      // The Dart bridge can announce readiness before the WordPress footer
      // bridge attaches its listener. Confirm readiness again from the web
      // shell only after Flutter has mounted and painted its actual view.
      let flutterRendered = false;
      const announceRendered = () => {
        const renderedView = document.querySelector('flutter-view, flt-glass-pane');
        if (!renderedView) return false;
        flutterRendered = true;
        const loading = document.getElementById('kidia-flutter-loading');
        if (loading) loading.remove();
        requestAnimationFrame(() => requestAnimationFrame(() => {
          window.parent.postMessage(JSON.stringify({
            type: 'kidia-flutter-preview-ready'
          }), '*');
        }));
        return true;
      };
      if (!announceRendered()) {
        const observer = new MutationObserver(() => {
          if (announceRendered()) observer.disconnect();
        });
        observer.observe(document.body, { childList: true, subtree: true });
      }
      window.addEventListener('message', (event) => {
        let message = event.data;
        if (typeof message === 'string') {
          try { message = JSON.parse(message); } catch (_) { return; }
        }
        if (flutterRendered && message && message.type === 'kidia-preview-layout') {
          announceRendered();
        }
      });

      if ('serviceWorker' in navigator) {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => {
            return registration.scope.includes('/admin/flutter-preview/')
              ? registration.unregister()
              : Promise.resolve(false);
          }));
        } catch (error) {
          console.warn('Could not clear the old preview worker.', error);
        }
      }

      const version = new URLSearchParams(window.location.search).get('v') || '';
      window.__kidiaPreviewVersion = version;
      const bootstrap = document.createElement('script');
      bootstrap.src = 'flutter_bootstrap.js' + (version ? '?v=' + encodeURIComponent(version) : '');
      bootstrap.addEventListener('error', () => {
        const loading = document.getElementById('kidia-flutter-loading');
        if (!loading) return;
        loading.classList.add('is-error');
        loading.textContent = 'Flutter preview could not load. Refresh this page to retry.';
      });
      document.body.appendChild(bootstrap);
    })();
  </script>
</body>
</html>
